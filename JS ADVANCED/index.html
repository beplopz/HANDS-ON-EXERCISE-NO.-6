<!DOCTYPE html>
<html>

<head>
    <title>Javascript Web Output #1</title>
    <style>
        .even {
            color: green;
        }

        .odd {
            color: blue;
        }

        #numberList {
            list-style: none;
            padding-left: 0;
        }
    </style>
</head>

<body>

    <h1>Javascript Web Output #1</h1>

    Insert any Positive Numbers:
    <input type="number" id="numberInput"><br>
    <button onclick="insertNumber()">Insert</button>
    <button onclick="clearEntry()">Clear Entry</button>



    <fieldset>
        <legend>Inserted Numbers</legend>
        <ol id="numberList"></ol>
        <p><b>TOTAL:</b> <span id="total">0</span></p>
        <p><b>HIGHEST:</b> <span id="highest"></span></p>
        <p><b>LOWEST:</b> <span id="lowest"></span></p>
    </fieldset>

    <button onclick="clearItems()">Clear Items</button>
    <button onclick="getTotal()">Get Total</button>
    <button onclick="identifyHL()">Identify Highest and Lowest Number</button>

    Sort by:
    <select onchange="sortNumbers(this.value)">
        <option>Please select</option>
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
    </select>

    <script src="script.js"></script>

</body>

</html>
